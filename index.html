<!DOCTYPE html>
<html>
<head>
  <title>Merge Sort</title>
  <style>
    body {
      background-color: black;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    #bars {
      width: 1100px;
      height: 450px;
      border: 1px solid white;
      margin: 20px auto;
      display: flex;
      align-items: flex-end;
      gap: 2px;
      padding: 5px;
    }

    .bar {
      background-color: white;
      width: 20px;
    }

    button {
      margin: 10px;
      padding: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h1>Merge Sort Visualizer</h1>

  <button onclick="makeBars()">Make Bars</button>
  <button onclick="startMergeSort()">Merge Sort</button>

  <div id="bars"></div>

  <script>
    let numbers = [];
    let sorting = false;

    function makeBars() {
      if (sorting) {
        return;
      }

      numbers = [];

      for (let i = 0; i < 50; i++) {
        let randomNum = Math.floor(Math.random() * 400) + 20;
        numbers.push(randomNum);
      }

      drawBars();
    }

    function drawBars(redBars = []) {
      let barsDiv = document.getElementById("bars");
      barsDiv.innerHTML = "";

      for (let i = 0; i < numbers.length; i++) {
        let bar = document.createElement("div");
        bar.className = "bar";
        bar.style.height = numbers[i] + "px";

        if (redBars.includes(i)) {
          bar.style.backgroundColor = "red";
        } else {
          bar.style.backgroundColor = "white";
        }

        barsDiv.appendChild(bar);
      }
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function startMergeSort() {
      if (sorting) {
        return;
      }

      sorting = true;
      await mergeSort(0, numbers.length - 1);
      drawBars();
      sorting = false;
    }

    async function mergeSort(left, right) {
      if (left >= right) {
        return;
      }

      let middle = Math.floor((left + right) / 2);

      await mergeSort(left, middle);
      await mergeSort(middle + 1, right);
      await merge(left, middle, right);
    }

    async function merge(left, middle, right) {
      let leftArray = [];
      let rightArray = [];

      for (let i = left; i <= middle; i++) {
        leftArray.push(numbers[i]);
      }

      for (let i = middle + 1; i <= right; i++) {
        rightArray.push(numbers[i]);
      }

      let i = 0;
      let j = 0;
      let k = left;

      while (i < leftArray.length && j < rightArray.length) {
        drawBars([left + i, middle + 1 + j]);
        await sleep(70);

        if (leftArray[i] < rightArray[j]) {
          numbers[k] = leftArray[i];
          i++;
        } else {
          numbers[k] = rightArray[j];
          j++;
        }

        drawBars([k]);
        await sleep(70);
        k++;
      }

      while (i < leftArray.length) {
        drawBars([left + i]);
        await sleep(70);
        numbers[k] = leftArray[i];
        i++;
        k++;
        drawBars([k - 1]);
        await sleep(70);
      }

      while (j < rightArray.length) {
        drawBars([middle + 1 + j]);
        await sleep(70);
        numbers[k] = rightArray[j];
        j++;
        k++;
        drawBars([k - 1]);
        await sleep(70);
      }
    }

    makeBars();
  </script>
</body>
</html>
